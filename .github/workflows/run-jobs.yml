name: Run Visitalo jobs

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  run-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar POST /api/jobs/run en producción
        run: |
          curl -sf -X POST "https://visitalo.vercel.app/api/jobs/run" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP %{http_code}\n"
